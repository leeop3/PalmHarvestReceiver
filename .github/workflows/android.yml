name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper (Sandbox Fix)
        run: |
          mkdir temp_wrap
          cd temp_wrap
          touch settings.gradle
          # Generate the 8.4 wrapper in the sandbox
          gradle wrapper --gradle-version 8.4
          cd ..
          
          # FIX: Delete existing wrapper files/folders to prevent "Directory not empty" error
          rm -rf gradle gradlew gradlew.bat
          
          # Move new wrapper files to root
          mv temp_wrap/gradle .
          mv temp_wrap/gradlew .
          mv temp_wrap/gradlew.bat .
          
          # Ensure execution permission
          chmod +x gradlew
          rm -rf temp_wrap

      - name: Build Debug APK
        # Use the newly generated wrapper
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PalmHarvest-Golden-Build
          path: app/build/outputs/apk/debug/app-debug.apk